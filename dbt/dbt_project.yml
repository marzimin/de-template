name: 'de_template'
version: '1.0.0'
config-version: 2

profile: 'de_template'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  de_template:
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: staging
      +materialized: ephemeral
    marts:
      +schema: marts
      +materialized: table
